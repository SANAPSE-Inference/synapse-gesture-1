<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Synapse Matrix V12.8 | Probe Override</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <audio id="bgm_audio" loop preload="auto"><source src="bgm.mp3?v=stable" type="audio/mpeg"></audio>
    <audio id="sfx_switch" preload="auto"><source src="switch.mp3?v=stable" type="audio/mpeg"></audio>
    <audio id="sfx_firework" preload="auto"><source src="firework.mp3?v=stable" type="audio/mpeg"></audio>

    <video id="input_video" playsinline webkit-playsinline autoplay muted style="position: absolute; top: 10px; left: 10px; width: 120px; height: 160px; z-index: 999; border: 2px solid #FF4500; background: #111; object-fit: cover; box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);"></video>
    
    <canvas id="output_canvas"></canvas>
    
    <div id="ignition_overlay">
        <div class="ignition_btn">
            SYSTEM STANDBY
            <br>
            <span class="ignition_sub">[ 点击屏幕 重建神经链路 ]</span>
        </div>
    </div>
    
    <div id="ui_layer">
        <p id="status_text">MATRIX_CORE: 离线 | 等待点火指令</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
