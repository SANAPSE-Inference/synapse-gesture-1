<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Synapse V12.5 | Local Core</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/@mediapipe/hands/hands.js"></script>
</head>
<body>
    <audio id="bgm_audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
    <audio id="sfx_switch" preload="auto"><source src="switch.mp3" type="audio/mpeg"></audio>
    <audio id="sfx_firework" preload="auto"><source src="firework.mp3" type="audio/mpeg"></audio>
    <video id="input_video" playsinline webkit-playsinline autoplay muted style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; z-index: -1;"></video>
    <canvas id="output_canvas"></canvas>
    <div id="ignition_overlay"><div class="ignition_btn">SYSTEM STANDBY<br><span class="ignition_sub">[ 点击屏幕 重建神经链路 ]</span></div></div>
    <div id="ui_layer"><p id="status_text">MATRIX_CORE: 等待初始化</p></div>
    <script src="script.js"></script>
</body>
</html>
